<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>週會任務管理</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F6F2;--surface:#fff;--surface2:#F0EEE9;
  --border:#E2DFD8;--border-strong:#C8C4BB;
  --text:#1A1916;--text-2:#6B6860;--text-3:#9E9C96;
  --accent:#2D5016;--accent-bg:#EAF2DE;--accent-text:#2D5016;
  --danger:#7A1F1F;--danger-bg:#FDF0F0;
  --warn-bg:#FEF9EC;--warn-text:#7A5210;
  --r-sm:6px;--r-md:10px;--r-lg:14px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 16px rgba(0,0,0,.10),0 2px 4px rgba(0,0,0,.06);
  --font:'Noto Sans TC',system-ui,sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6;-webkit-font-smoothing:antialiased}

/* ── layout ── */
.layout{display:flex;min-height:100vh}
.sidebar{width:220px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:20;overflow-y:auto}
.sidebar-logo{padding:20px 18px 16px;border-bottom:1px solid var(--border)}
.app-name{font-size:14px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px}
.app-sub{font-size:11px;color:var(--text-3);margin-top:2px}
.sidebar-section{padding:12px 10px 4px}
.sidebar-section-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);padding:0 8px;margin-bottom:4px}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:var(--r-sm);font-size:13px;color:var(--text-2);cursor:pointer;border:none;background:none;width:100%;text-align:left;transition:background .12s,color .12s;font-family:var(--font)}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--accent-bg);color:var(--accent-text);font-weight:500}
.week-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.week-pct{font-size:10px;font-weight:600;color:var(--text-3);flex-shrink:0}
.nav-item.active .week-pct{color:var(--accent-text)}
.sidebar-add-btn{margin:8px 10px 0;padding:7px 12px;border-radius:var(--r-sm);border:1px dashed var(--border-strong);background:none;color:var(--text-3);font-size:12px;cursor:pointer;width:calc(100% - 20px);display:flex;align-items:center;gap:6px;transition:all .12s;font-family:var(--font)}
.sidebar-add-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.sidebar-footer{margin-top:auto;padding:12px 18px 16px;border-top:1px solid var(--border)}
.sidebar-footer button{font-size:11px;color:var(--text-3);background:none;border:none;cursor:pointer;font-family:var(--font);width:100%;text-align:left;padding:0}
.sidebar-footer button:hover{color:var(--text-2)}

.main{margin-left:220px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;gap:12px}
.topbar-left{display:flex;align-items:center;gap:12px;min-width:0}
.topbar-title{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar-sub{font-size:12px;color:var(--text-3);white-space:nowrap}
.topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.view-toggle{display:flex;background:var(--surface2);border-radius:var(--r-sm);padding:3px;gap:2px}
.view-btn{padding:5px 12px;border:none;background:none;border-radius:4px;font-size:12px;font-weight:500;color:var(--text-2);cursor:pointer;transition:all .12s;font-family:var(--font);display:flex;align-items:center;gap:5px}
.view-btn:hover{color:var(--text)}
.view-btn.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow)}
.sync-status{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-3)}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text-3);transition:background .3s;flex-shrink:0}
.sync-dot.synced{background:#5a9e2e}
.sync-dot.syncing{background:#d4a520;animation:pulse .8s ease-in-out infinite}
.sync-dot.error{background:#c03030}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.refresh-btn{padding:5px 10px;border-radius:var(--r-sm);border:1px solid var(--border);background:none;color:var(--text-2);font-size:12px;cursor:pointer;font-family:var(--font);display:flex;align-items:center;gap:4px;transition:all .12s}
.refresh-btn:hover{background:var(--surface2);color:var(--text)}

/* ── pages ── */
.page{display:none;padding:28px}
.page.active{display:block}
.setup-banner{background:var(--warn-bg);border:1px solid #E6C97A;border-radius:var(--r-md);padding:14px 18px;margin-bottom:20px;display:flex;align-items:flex-start;gap:12px}
.setup-banner.hidden{display:none}
.setup-banner-text{font-size:13px;color:var(--warn-text)}
.setup-link{color:var(--accent);font-weight:500;cursor:pointer;text-decoration:underline}

/* ── member grid ── */
.member-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;flex:3;min-width:0}
.member-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow);display:flex;flex-direction:column}
.card-head{padding:14px 16px 12px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}

/* ── avatar ── */
.avatar-wrap{position:relative;flex-shrink:0;cursor:pointer}
.avatar-wrap:hover .avatar-edit{opacity:1}
.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0;object-fit:cover;overflow:hidden;user-select:none}
img.avatar{object-fit:cover}
.avatar-edit{position:absolute;inset:0;border-radius:50%;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;pointer-events:none}
.avatar-edit svg{color:#fff}

.card-head-info{flex:1;min-width:0;display:flex;align-items:center;gap:6px}
.card-member-name{font-size:14px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-head-right{display:flex;align-items:center;gap:4px;flex-shrink:0}
.card-progress-row{display:flex;align-items:center;gap:6px;width:100%;margin-top:3px}
.mini-bar{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.mini-bar-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s}
.mini-pct{font-size:10px;color:var(--text-3);font-weight:500;flex-shrink:0}

.icon-btn{background:none;border:none;cursor:pointer;color:var(--text-3);padding:3px;border-radius:4px;display:flex;align-items:center;transition:color .12s,background .12s}
.icon-btn:hover{color:var(--text-2);background:var(--surface2)}

.card-body{padding:12px 14px;flex:1;display:flex;flex-direction:column;gap:8px}
.add-row{display:flex;gap:6px}
.add-input{flex:1;font-size:13px;padding:7px 10px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--surface2);color:var(--text);outline:none;font-family:var(--font);transition:border-color .12s,background .12s}
.add-input:focus{border-color:var(--accent);background:var(--surface)}
.add-input::placeholder{color:var(--text-3)}
.add-btn{padding:7px 12px;border-radius:var(--r-sm);border:1px solid var(--border);background:var(--surface);color:var(--text-2);font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font);transition:all .12s;white-space:nowrap}
.add-btn:hover{background:var(--accent-bg);color:var(--accent);border-color:var(--accent)}

/* ── task list + drag ── */
.task-list{display:flex;flex-direction:column;gap:4px;max-height:300px;overflow-y:auto}
.task-list::-webkit-scrollbar{width:4px}
.task-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.task-item{display:flex;align-items:flex-start;gap:8px;padding:7px 9px;border-radius:var(--r-sm);border:1px solid transparent;background:var(--surface2);transition:background .12s,border-color .12s,opacity .15s;cursor:default}
.task-item:hover{border-color:var(--border)}
.task-item.done{opacity:.5}
.task-item.dragging{opacity:.35;border:1px dashed var(--border-strong)}
.task-item.drag-over{border-color:var(--accent);background:var(--accent-bg)}
.drag-handle{color:var(--text-3);cursor:grab;padding:1px 2px;flex-shrink:0;opacity:0;transition:opacity .1s;display:flex;align-items:center;margin-top:2px}
.task-item:hover .drag-handle{opacity:1}
.drag-handle:active{cursor:grabbing}
.task-check{width:15px;height:15px;margin-top:2px;flex-shrink:0;cursor:pointer;accent-color:var(--accent)}
.task-label{font-size:13px;color:var(--text);flex:1;line-height:1.5;word-break:break-all}
.task-item.done .task-label{text-decoration:line-through;color:var(--text-3)}
.task-del{background:none;border:none;color:var(--text-3);cursor:pointer;padding:1px 3px;font-size:14px;line-height:1;border-radius:3px;opacity:0;transition:opacity .1s;flex-shrink:0}
.task-item:hover .task-del{opacity:1}
.task-del:hover{color:var(--danger);background:var(--danger-bg)}
.empty-state{font-size:12px;color:var(--text-3);text-align:center;padding:16px 0 8px}
.content-layout{display:flex;gap:16px;align-items:flex-start}
.discussion-wrap{flex:1;min-width:0;position:sticky;top:72px;max-width:25%}
.discussion-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow)}
.discussion-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.discussion-head-icon{width:28px;height:28px;border-radius:50%;background:var(--accent-bg);color:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.discussion-head-title{font-size:14px;font-weight:600;color:var(--text);flex:1}
.discussion-body{padding:14px 16px;min-height:680px;font-size:13px;color:var(--text);line-height:1.8;outline:none;word-break:break-word;overflow-y:auto}
.discussion-body:empty::before{content:attr(data-placeholder);color:var(--text-3);pointer-events:none}
.discussion-body a{color:var(--accent);text-decoration:underline;text-underline-offset:2px;word-break:break-all}
.discussion-body a:hover{opacity:.75}
.discussion-footer{padding:6px 16px 10px;display:flex;align-items:center;gap:8px;border-top:1px solid var(--border)}
.discussion-body img{max-width:100%;border-radius:var(--r-sm);margin:4px 0;display:block;cursor:zoom-in}
.disc-img-wrap{position:relative;display:inline-block;max-width:100%;margin:4px 0}
.disc-img-remove{position:absolute;top:4px;right:4px;width:20px;height:20px;border-radius:50%;background:rgba(0,0,0,.55);color:#fff;border:none;cursor:pointer;font-size:14px;line-height:1;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;padding:0}
.disc-img-wrap:hover .disc-img-remove{opacity:1}
.disc-img-remove:hover{background:rgba(180,0,0,.8)}
.discussion-body img:hover{opacity:.9}
.discussion-footer-hint{font-size:11px;color:var(--text-3);flex:1}
.discussion-link-btn{padding:4px 10px;border-radius:var(--r-sm);border:1px solid var(--border);background:none;color:var(--text-3);font-size:11px;cursor:pointer;font-family:var(--font);display:flex;align-items:center;gap:4px;transition:all .12s}
.discussion-link-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.task-link{color:var(--accent);text-decoration:underline;text-underline-offset:2px;word-break:break-all;cursor:pointer}
.task-link:hover{opacity:.75}
.task-link-icon{display:inline-block;margin-left:3px;opacity:.5;vertical-align:middle;flex-shrink:0}
/* 新增任務 modal 裡的欄位 */
.task-add-modal input{margin-bottom:10px}
.task-add-modal .hint{font-size:11px;color:var(--text-3);margin-top:-6px;margin-bottom:10px}

/* ── overview ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px}
.stat-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:14px 16px;box-shadow:var(--shadow)}
.stat-label{font-size:11px;color:var(--text-3);font-weight:500;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.stat-value{font-size:26px;font-weight:600;line-height:1}
.stat-sub{font-size:11px;color:var(--text-3);margin-top:4px}
.overall-bar{height:6px;background:var(--border);border-radius:3px;margin-top:8px;overflow:hidden}
.overall-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .5s}
.overview-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow)}
.overview-table{width:100%;border-collapse:collapse}
.overview-table th{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);padding:12px 16px;text-align:left;border-bottom:1px solid var(--border);background:var(--surface2)}
.overview-table td{padding:12px 16px;border-bottom:1px solid var(--border);vertical-align:middle}
.overview-table tr:last-child td{border-bottom:none}
.overview-table tr:hover td{background:var(--surface2)}
.member-cell{display:flex;align-items:center;gap:9px}
.member-cell .name{font-size:13px;font-weight:600}
.member-cell .count{font-size:11px;color:var(--text-3)}
.task-chips{display:flex;flex-wrap:wrap;gap:5px}
.chip{font-size:11px;padding:3px 9px;border-radius:100px;border:1px solid var(--border);color:var(--text-2);background:var(--surface2)}
.chip.done{text-decoration:line-through;opacity:.45}
.row-bar-wrap{display:flex;align-items:center;gap:8px;min-width:100px}
.row-bar{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.row-bar-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .4s}
.row-pct{font-size:11px;font-weight:600;color:var(--text-3);min-width:28px;text-align:right}

/* ── config screen ── */
.config-screen{max-width:520px;margin:80px auto;padding:40px;background:var(--surface);border-radius:var(--r-lg);border:1px solid var(--border);box-shadow:var(--shadow-md)}
.config-screen h2{font-size:20px;font-weight:600;margin-bottom:8px}
.config-screen .desc{font-size:14px;color:var(--text-2);margin-bottom:28px;line-height:1.7}
.config-screen label{font-size:13px;font-weight:500;color:var(--text-2);display:block;margin-bottom:6px}
.config-screen input{width:100%;font-size:14px;padding:10px 12px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--surface2);color:var(--text);outline:none;font-family:var(--font);margin-bottom:6px;transition:border-color .12s}
.config-screen input:focus{border-color:var(--accent);background:var(--surface)}
.config-hint{font-size:12px;color:var(--text-3);margin-bottom:20px}
.config-error{font-size:12px;color:var(--danger);margin-bottom:12px;min-height:18px}

/* ── modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(2px);animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border-radius:var(--r-lg);border:1px solid var(--border);padding:24px;width:380px;box-shadow:var(--shadow-md);animation:slideUp .15s ease}
@keyframes slideUp{from{transform:translateY(8px);opacity:0}to{transform:none;opacity:1}}
.modal h3{font-size:15px;font-weight:600;margin-bottom:6px}
.modal p{font-size:13px;color:var(--text-2);margin-bottom:16px;line-height:1.6}
.modal label{font-size:12px;font-weight:500;color:var(--text-2);display:block;margin-bottom:4px}
.modal input{width:100%;font-size:13px;padding:9px 12px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--surface2);color:var(--text);outline:none;font-family:var(--font);margin-bottom:12px;transition:border-color .12s}
.modal input:focus{border-color:var(--accent);background:var(--surface)}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}
.btn{padding:8px 18px;border-radius:var(--r-sm);font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font);border:1px solid var(--border);background:var(--surface);color:var(--text-2);transition:all .12s}
.btn:hover{background:var(--surface2);color:var(--text)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:#3d6b20;border-color:#3d6b20}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-danger{background:var(--danger);color:#fff;border-color:var(--danger)}
.btn-danger:hover{background:#5c1515}

/* avatar picker inside modal */
.avatar-picker{display:flex;align-items:center;gap:14px;margin-bottom:16px;padding:14px;background:var(--surface2);border-radius:var(--r-md);border:1px solid var(--border)}
.avatar-preview{width:56px;height:56px;border-radius:50%;object-fit:cover;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:600;flex-shrink:0}
.avatar-picker-right{flex:1}
.avatar-picker-right p{font-size:12px;color:var(--text-3);margin-top:4px}
.upload-btn{padding:6px 14px;border-radius:var(--r-sm);border:1px solid var(--border);background:var(--surface);color:var(--text-2);font-size:12px;font-weight:500;cursor:pointer;font-family:var(--font);transition:all .12s}
.upload-btn:hover{background:var(--accent-bg);color:var(--accent);border-color:var(--accent)}
.color-swatches{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.swatch{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .12s,border-color .12s}
.swatch:hover{transform:scale(1.15)}
.swatch.active{border-color:var(--text)}

/* toast */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:300;cursor:zoom-out;animation:fadeIn .15s ease}
.lightbox img{max-width:90vw;max-height:90vh;border-radius:var(--r-md);box-shadow:0 8px 40px rgba(0,0,0,.5)}
.lightbox-close{position:fixed;top:20px;right:24px;color:#fff;font-size:28px;cursor:pointer;line-height:1;opacity:.8}
.lightbox-close:hover{opacity:1}
.toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:#fff;font-size:13px;padding:10px 16px;border-radius:var(--r-md);box-shadow:var(--shadow-md);z-index:200;animation:toastIn .2s ease;pointer-events:none}
@keyframes toastIn{from{transform:translateY(10px);opacity:0}to{transform:none;opacity:1}}

/* mobile */
@media(max-width:900px){
  .content-layout{flex-direction:column}
  .discussion-wrap{width:100%!important;position:static}
  .member-grid{grid-template-columns:1fr!important}
  .discussion-body{min-height:300px!important}
}
@media(max-width:700px){
  .sidebar{transform:translateX(-100%);transition:transform .2s}
  .sidebar.open{transform:none;box-shadow:var(--shadow-md)}
  .main{margin-left:0}
  .mobile-menu-btn{display:flex !important}
  .page{padding:16px}
  .member-grid{grid-template-columns:1fr}
  .config-screen{margin:20px;padding:24px}
}
.mobile-menu-btn{display:none;background:none;border:none;cursor:pointer;padding:4px;color:var(--text)}
.mobile-overlay{display:none;position:fixed;inset:0;z-index:15;background:rgba(0,0,0,.3)}
.mobile-overlay.show{display:block}
</style>
</head>
<body>

<!-- ① 設定畫面 -->
<div id="config-screen" class="config-screen" style="display:none">
  <h2>⚙️ 設定 API 網址</h2>
  <p class="desc">請貼上你在 Google Apps Script 部署後取得的 <strong>Web App 網址</strong>。<br/>設定一次後瀏覽器會記住，之後直接使用。</p>
  <label>Google Apps Script Web App 網址</label>
  <input id="api-url-input" type="url" placeholder="https://script.google.com/macros/s/xxxxx/exec"/>
  <div class="config-hint">網址應以 https://script.google.com 開頭，結尾為 /exec</div>
  <div class="config-error" id="config-error"></div>
  <button class="btn btn-primary" id="connect-btn" onclick="saveApiUrl()" style="width:100%">連線並開始使用</button>
</div>

<!-- ② 主介面 -->
<div class="layout" id="main-layout" style="display:none">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="app-name">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" style="flex-shrink:0">
          <rect x="1" y="1" width="7" height="7" rx="2" fill="#2D5016" opacity=".8"/>

// ══════════════════════════════
//  JSONP 網路
// ══════════════════════════════
function gasGet(params) {
  return new Promise((resolve,reject)=>{
    const cb='_cb_'+Date.now()+'_'+Math.random().toString(36).slice(2);
    const timer=setTimeout(()=>{ delete window[cb]; reject(new Error('timeout')); },15000);
    window[cb]=(data)=>{ clearTimeout(timer); delete window[cb]; resolve(data); };
    const qs=Object.entries({...params,callback:cb}).map(([k,v])=>encodeURIComponent(k)+'='+encodeURIComponent(v)).join('&');
    const s=document.createElement('script');
    s.src=apiUrl+'?'+qs;
    s.onerror=()=>{ clearTimeout(timer); delete window[cb]; reject(new Error('Script load error')); };
    document.head.appendChild(s);
    setTimeout(()=>s.remove(),20000);
  });
}

function weeksWithDiscussion(weeks){
  return weeks.map(w=>{
    const copy=JSON.parse(JSON.stringify(w));
    // encode discussion
    if(w.discussion!==undefined){
      if(!copy.tasks['__discussion__']) copy.tasks['__discussion__']=[];
      copy.tasks['__discussion__']=[{id:'disc-'+w.id, text:'__DISCUSSION__', html:w.discussion, done:false}];
    }
    // encode members meta into first week
    return copy;
  });
}

function weeksWithMeta(weeks){
  // prepend a synthetic meta week carrying member avatars
  const metaWeek={id:'__meta__',label:'__meta__',tasks:{}};
  encodeMembersToState();
  metaWeek.tasks['__members__']=(state.membersMeta||[]).map((m,i)=>({
    id:'meta-'+i, text:'__MEMBER__', name:m.name, bg:m.bg, fg:m.fg, avatar:m.avatar||null, done:false
  }));
  return [metaWeek, ...weeks];
}

function weeksDecodeDiscussion(weeks){
  // extract meta week
  const metaIdx=weeks.findIndex(w=>w.id==='__meta__');
  if(metaIdx!==-1){
    const metaWeek=weeks[metaIdx];
    weeks.splice(metaIdx,1);
    const membersData=(metaWeek.tasks['__members__']||[]);
    if(membersData.length){
      state.membersMeta=membersData.map(m=>({name:m.name,bg:m.bg,fg:m.fg,avatar:m.avatar||null}));
      decodeMembersFromState();
    }
  }
  return weeks.map(w=>{
    const disc=(w.tasks&&w.tasks['__discussion__'])||[];
    if(disc.length) w.discussion=disc[0].html||'';
    delete w.tasks['__discussion__'];
    return w;
  });
}

async function gasSave(weeks) {
  const payload = JSON.stringify({
    action: 'saveAll',
    weeks: weeksWithDiscussion(weeksWithMeta(weeks))
  });

  // 先嘗試 POST（no-cors）— 送出後不驗證，避免巢狀 gasGet 造成 timeout
  try {
    await fetch(apiUrl, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: payload
    });
    return { ok: true };
  } catch(e) {
    // fetch 本身拋出例外（非 no-cors opaque）才走分批 GET 備援
    return await gasSaveChunked(payload);
  }
}

async function gasSaveChunked(payload) {
  const json = payload; // already stringified
  const CHUNK = 600;
  const total = Math.ceil(json.length / CHUNK);
  const batchId = 'b' + Date.now();
  for (let i = 0; i < total; i++) {
    const res = await gasGet({
      action: 'saveChunk',
      batchId,
      chunkIndex: i,
      chunkTotal: total,
      chunkData: json.slice(i * CHUNK, (i + 1) * CHUNK)
    });
    if (!res || !res.ok) throw new Error((res && res.error) || 'saveChunk failed at ' + i);
  }
  const res = await gasGet({ action: 'commitChunks', batchId, total });
  if (!res || !res.ok) throw new Error((res && res.error) || 'commitChunks failed');
  return { ok: true };
}

async function loadFromServer(showToast) {
  if(!hasApi){ useLocalFallback(); return; }
  setSyncStatus('syncing','同步中...');
  try {
    const res=await gasGet({action:'getData'});
    if(!res.ok) throw new Error(res.error||'API error');
    const {weeks,idCounter}=res.data;
    if(weeks&&weeks.length){
      state.weeks=weeksDecodeDiscussion(weeks);
      state.idCounter=Math.max(idCounter||0,state.idCounter);
      if(!state.currentWeek||!state.weeks.find(w=>w.id===state.currentWeek))
        state.currentWeek=state.weeks[0].id;
      // 確保所有成員在每個週次都有欄位
      state.weeks.forEach(w=>{ members.forEach(m=>{ if(!w.tasks[m.name]) w.tasks[m.name]=[]; }); });
    } else {
      seedData(); await gasSave(state.weeks);
    }
    localStorage.setItem(LS_DATA,JSON.stringify(state));
    renderAll(); setSyncStatus('synced','已同步');
    if(showToast) toast('已載入最新資料');
  } catch(err){
    console.error('loadFromServer:',err);
    // GET 失敗才是真的連線失敗
    setSyncStatus('error','連線失敗，請重新整理');
    useLocalFallback();
    if(showToast) toast('無法連線，顯示本機資料');
  }
}

async function pushToServer() {
  localStorage.setItem(LS_DATA,JSON.stringify(state));
  if(!hasApi) return;
  setSyncStatus('syncing','儲存中...');
  try {
    await gasSave(state.weeks);
    setSyncStatus('synced','已儲存');
  } catch(err){
    console.error('pushToServer:',err);
    setSyncStatus('synced','已暫存（同步中）');
    setTimeout(()=>{ if(hasApi) pushToServer(); }, 6000);
  }
}

function debounceSave() {
  setSyncStatus('syncing','儲存中...');
  clearTimeout(saveTimer);
  saveTimer=setTimeout(pushToServer,1200);
}

function setSyncStatus(type,label) {
  const dot=document.getElementById('sync-dot');
  const lbl=document.getElementById('sync-label');
  if(!dot||!lbl) return;
  dot.className='sync-dot'+(type==='synced'?' synced':type==='syncing'?' syncing':type==='error'?' error':'');
  lbl.textContent=label;
}

          <button class="btn btn-primary" onclick="confirmAddMember()">新增</button>
        </div>
      </div>
    </div>`;
  setTimeout(()=>{ document.getElementById('new-member-name').focus(); },50);
  window._addPickedBg = pickedBg;
  window._addPickedFg = pickedFg;
}

function pickSwatch(idx, mode) {
  const s = SWATCHES[idx];
  if (mode==='add') {
    window._addPickedBg=s.bg; window._addPickedFg=s.fg;
    document.querySelectorAll('#add-swatches .swatch').forEach((el,i)=>{
      el.classList.toggle('active',i===idx);
      el.style.borderColor=i===idx?'#333':'transparent';
    });
  } else {
    window._editPickedBg=s.bg; window._editPickedFg=s.fg;
    document.querySelectorAll('#edit-swatches .swatch').forEach((el,i)=>{
      el.classList.toggle('active',i===idx);
      el.style.borderColor=i===idx?'#333':'transparent';
    });
    // 即時更新 modal 預覽
    const prev=document.getElementById('edit-avatar-preview');
    if(prev&&!window._editHasAvatar){
      prev.style.background=s.bg;
      prev.style.color=s.fg;
    }
  }
}

function confirmAddMember() {
  const name=(document.getElementById('new-member-name').value||'').trim();
  if(!name){ toast('請輸入姓名'); return; }
  if(members.find(m=>m.name===name)){ toast('已有同名成員'); return; }
  const newMember={name, bg:window._addPickedBg||DEFAULT_COLORS[0].bg, fg:window._addPickedFg||DEFAULT_COLORS[0].fg, avatar:null};
  members.push(newMember);
  saveMembersMeta();
  // 在所有週次加入此成員欄位
  state.weeks.forEach(w=>{ if(!w.tasks[name]) w.tasks[name]=[]; });
  closeModal();
  renderAll();
  debounceSave();
  toast(`已新增成員「${name}」`);
}

function showEditMemberModal(memberName) {
  const m=getMember(memberName);
  window._editPickedBg=m.bg; window._editPickedFg=m.fg; window._editHasAvatar=!!m.avatar;
  document.getElementById('modal-host').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h3>編輯成員</h3>
        <div class="avatar-picker">
          ${m.avatar
            ? `<img id="edit-avatar-preview" src="${m.avatar}" class="avatar-preview" style="width:56px;height:56px"/>`
            : `<div id="edit-avatar-preview" class="avatar-preview" style="background:${m.bg};color:${m.fg}">${m.name[0]}</div>`}
          <div class="avatar-picker-right">
            <button class="upload-btn" onclick="triggerAvatarUpload('${memberName}')">上傳頭貼</button>
            ${m.avatar?`<button class="upload-btn" style="margin-left:6px" onclick="removeAvatar('${memberName}')">移除</button>`:''}
            <p>支援 JPG、PNG，建議正方形圖片</p>
            <div class="color-swatches" id="edit-swatches">
              ${SWATCHES.map((s,i)=>`<div class="swatch${s.bg===m.bg?' active':''}" style="background:${s.bg};border-color:${s.bg===m.bg?'#333':'transparent'}" onclick="pickSwatch(${i},'edit')"></div>`).join('')}
            </div>
          </div>
        </div>
        <label>姓名</label>
        <input id="edit-member-name" value="${escHtml(memberName)}" maxlength="10"/>
        <div class="modal-btns">
          <button class="btn btn-danger" onclick="confirmDeleteMember('${memberName}')">刪除成員</button>
          <button class="btn" onclick="closeModal()" style="margin-left:auto">取消</button>
          <button class="btn btn-primary" onclick="confirmEditMember('${memberName}')">儲存</button>
        </div>
      </div>
    </div>`;
}

function confirmEditMember(oldName) {
  const newName=(document.getElementById('edit-member-name').value||'').trim();
  if(!newName){ toast('請輸入姓名'); return; }
  const m=getMember(oldName);
  const newBg=window._editPickedBg||m.bg;
  const newFg=window._editPickedFg||m.fg;
  // 更新 meta
  m.name=newName; m.bg=newBg; m.fg=newFg;
  saveMembersMeta();
  // 更新任務資料裡的成員名稱
  if(newName!==oldName){
    state.weeks.forEach(w=>{
      if(w.tasks[oldName]!==undefined){
        w.tasks[newName]=w.tasks[oldName];
        delete w.tasks[oldName];
      }
    });
  }
  closeModal(); renderAll(); debounceSave();
  toast('成員資料已更新');
}

function confirmDeleteMember(memberName) {
  if(!confirm(`確定要刪除「${memberName}」嗎？該成員的所有任務也會一起刪除。`)) return;
  members=members.filter(m=>m.name!==memberName);
  saveMembersMeta();
  state.weeks.forEach(w=>{ delete w.tasks[memberName]; });
  closeModal(); renderAll(); debounceSave();
  toast(`已刪除成員「${memberName}」`);
}

// ── 頭貼上傳 ──
function triggerAvatarUpload(memberName) {
  avatarTargetMember=memberName;
  document.getElementById('avatar-file-input').value='';
  document.getElementById('avatar-file-input').click();
}

async function handleAvatarUpload(e) {
  const file=e.target.files[0];
  if(!file||!avatarTargetMember) return;
  toast('頭貼上傳中...');
  try {
    // 上傳到雲端圖床，取得公開 URL，確保跨裝置同步
    const imgUrl = await uploadImageToCloud(file);
    if(!imgUrl) throw new Error('upload failed');
    const m=getMember(avatarTargetMember);
    m.avatar=imgUrl;
    window._editHasAvatar=true;
    saveMembersMeta();
    // 更新 modal 預覽
    const prev=document.getElementById('edit-avatar-preview');
    if(prev){
      if(prev.tagName==='IMG'){ prev.src=imgUrl; }
      else { prev.outerHTML=`<img id="edit-avatar-preview" src="${imgUrl}" class="avatar-preview" style="width:56px;height:56px"/>`; }
    }
    renderAll();
    debounceSave(); // 同步到雲端
    toast('✅ 頭貼已更新，所有人都看得到');
  } catch(err) {
    console.error('Avatar upload failed:', err);
    // fallback: base64 本機存
    const reader=new FileReader();
    reader.onload=(ev)=>{
      const m=getMember(avatarTargetMember);
      m.avatar=ev.target.result;
      window._editHasAvatar=true;
      saveMembersMeta();
      const prev=document.getElementById('edit-avatar-preview');
      if(prev){
        if(prev.tagName==='IMG'){ prev.src=ev.target.result; }
        else { prev.outerHTML=`<img id="edit-avatar-preview" src="${ev.target.result}" class="avatar-preview" style="width:56px;height:56px"/>`; }
      }
      renderAll();
      toast('⚠️ 圖床失敗，頭貼已暫存本機（他人無法看到）');
    };
    reader.readAsDataURL(file);
  }
}

function removeAvatar(memberName) {
  const m=getMember(memberName);
  m.avatar=null; window._editHasAvatar=false;
  saveMembersMeta();
  showEditMemberModal(memberName); // 重開 modal
  renderAll();
}

// ══════════════════════════════
//  週次
// ══════════════════════════════
function getWeek(){ return state.weeks.find(w=>w.id===state.currentWeek); }
function getWeekPct(week){
  let t=0,d=0;
  members.forEach(m=>{ const mt=week.tasks[m.name]||[]; t+=mt.length; d+=mt.filter(x=>x.done).length; });
  return t?Math.round(d/t*100):0;
}
function selectWeek(id){ state.currentWeek=id; renderAll(); closeSidebar(); }

function showNewWeekModal(){
  const ymd=new Date().toISOString().slice(0,10).replace(/-/g,'');
  document.getElementById('modal-host').innerHTML=`
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h3>新增週次</h3>
        <p>建立新一週的任務清單，全員可各自填入代辦事項。</p>
        <label>週次名稱</label>
        <input id="modal-inp" value="${ymd} 週會" onkeydown="if(event.key==='Enter')confirmNewWeek()"/>
        <div class="modal-btns">
          <button class="btn" onclick="closeModal()">取消</button>
          <button class="btn btn-primary" onclick="confirmNewWeek()">建立</button>
        </div>
      </div>
    </div>`;
  setTimeout(()=>{ const el=document.getElementById('modal-inp'); if(el){el.focus();el.select();} },50);
}

function confirmNewWeek(){
  const label=(document.getElementById('modal-inp').value||'').trim();
  if(!label) return;
  const id='w-'+Date.now();
  const week={id,label,tasks:{}};
  members.forEach(m=>{ week.tasks[m.name]=[]; });
  state.weeks.unshift(week); state.currentWeek=id;
  closeModal(); renderAll(); debounceSave();
  toast('已建立「'+label+'」');
}

// ══════════════════════════════
//  任務操作
// ══════════════════════════════
function addTask(memberName){
  const inp=document.getElementById('inp-'+memberName);
  const raw=inp.value.trim(); if(!raw) return;
  const w=getWeek(); if(!w) return;
  if(!w.tasks[memberName]) w.tasks[memberName]=[];
  // 自動偵測純網址（整個輸入就是 URL）
  const urlOnly = isUrl(raw);
  const task = urlOnly
    ? {id:++state.idCounter, text:raw, url:raw, done:false}
    : {id:++state.idCounter, text:raw, done:false};
  w.tasks[memberName].push(task);
  inp.value='';
  refreshCard(memberName); debounceSave();
}

function showAddLinkModal(memberName){
  document.getElementById('modal-host').innerHTML=`
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal task-add-modal">
        <h3>新增含超連結的任務</h3>
        <label>任務名稱</label>
        <input id="link-task-text" placeholder="例：查看設計稿" onkeydown="if(event.key==='Enter')document.getElementById('link-task-url').focus()"/>
        <label>網址</label>
        <input id="link-task-url" placeholder="https://..." type="url" onkeydown="if(event.key==='Enter')confirmAddLink('${memberName}')"/>
        <div class="hint">貼上任何網址，點擊任務時可直接開啟</div>
        <div class="modal-btns">
          <button class="btn" onclick="closeModal()">取消</button>
          <button class="btn btn-primary" onclick="confirmAddLink('${memberName}')">新增</button>
        </div>
      </div>
    </div>`;
  setTimeout(()=>{ document.getElementById('link-task-text').focus(); },50);
}

function confirmAddLink(memberName){
  const text=(document.getElementById('link-task-text').value||'').trim();
  const url=(document.getElementById('link-task-url').value||'').trim();
  if(!text){ toast('請輸入任務名稱'); return; }
  if(!url||!isUrl(url)){ toast('請輸入正確的網址'); return; }
  const w=getWeek(); if(!w) return;
  if(!w.tasks[memberName]) w.tasks[memberName]=[];
  w.tasks[memberName].push({id:++state.idCounter,text,url,done:false});
  closeModal(); refreshCard(memberName); debounceSave();
}

function isUrl(s){
  try{ const u=new URL(s); return u.protocol==='http:'||u.protocol==='https:'; }catch(e){ return false; }
}

// 渲染任務標籤（含超連結）
function renderTaskLabel(t){
  const label=escHtml(t.text);
  if(t.url){
    const urlDisplay=escHtml(t.url.length>40?t.url.slice(0,40)+'…':t.url);
    return `<span style="display:flex;flex-direction:column;gap:1px">
      <span>${label}</span>
      <a class="task-link" href="${escHtml(t.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${urlDisplay}<svg class="task-link-icon" width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M4 2H2a1 1 0 0 0-1 1v5a1 1 0 0 0 1 1h5a1 1 0 0 0 1-1V6M6 1h3m0 0v3m0-3L5 5" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/></svg></a>
    </span>`;
  }
  // 純網址型任務（text itself is URL）
  if(isUrl(t.text)){
    const short=escHtml(t.text.length>40?t.text.slice(0,40)+'…':t.text);
    return `<a class="task-link" href="${escHtml(t.text)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${short}<svg class="task-link-icon" width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M4 2H2a1 1 0 0 0-1 1v5a1 1 0 0 0 1 1h5a1 1 0 0 0 1-1V6M6 1h3m0 0v3m0-3L5 5" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/></svg></a>`;
  }
  return label;
}

// 總覽裡的 chip 標籤
function renderChipLabel(t){
  const label=escHtml(t.text);
  if(t.url) return `<a class="task-link" href="${escHtml(t.url)}" target="_blank" rel="noopener" style="text-decoration:none">${label} ↗</a>`;
  if(isUrl(t.text)) return `<a class="task-link" href="${escHtml(t.text)}" target="_blank" rel="noopener" style="text-decoration:none">${label} ↗</a>`;
  return label;
}

function toggleTask(memberName,id){
  const w=getWeek(); if(!w) return;
  const t=(w.tasks[memberName]||[]).find(t=>t.id===id);
  if(t) t.done=!t.done;
  refreshCard(memberName);
  if(view==='overview') renderOverview();
  debounceSave();
}

function deleteTask(memberName,id){
  const w=getWeek(); if(!w) return;
  w.tasks[memberName]=(w.tasks[memberName]||[]).filter(t=>t.id!==id);
  refreshCard(memberName); debounceSave();
}

function saveTaskText(el, memberName, id){
  el.style.background='';
  const w=getWeek(); if(!w) return;
  const t=(w.tasks[memberName]||[]).find(t=>t.id===id); if(!t) return;
  const newText=el.innerText.trim();
  if(!newText){ el.innerText=t.text; return; } // 不允許空白
  if(newText===t.text) return; // 沒有變化不儲存
  // 檢查是否為純網址
  t.text=newText;
  if(isUrl(newText)) t.url=newText;
  else if(t.url && t.text!==t.url) {} // 保留原有 url 欄位
  debounceSave();
}

// ══════════════════════════════
//  拖移排序
// ══════════════════════════════
let dragSrcMember=null, dragSrcIdx=null;

function onDragStart(e,memberName,idx){
  dragSrcMember=memberName; dragSrcIdx=idx;
  e.dataTransfer.effectAllowed='move';
  e.currentTarget.classList.add('dragging');
}
function onDragEnd(e){ e.currentTarget.classList.remove('dragging'); }
function onDragOver(e,memberName,idx){
  e.preventDefault(); e.dataTransfer.dropEffect='move';
  document.querySelectorAll(`#list-${memberName} .task-item`).forEach((el,i)=>el.classList.toggle('drag-over',i===idx));
}
function onDragLeave(e,memberName){ document.querySelectorAll(`#list-${memberName} .task-item`).forEach(el=>el.classList.remove('drag-over')); }
function onDrop(e,memberName,idx){
  e.preventDefault();
  document.querySelectorAll(`#list-${memberName} .task-item`).forEach(el=>el.classList.remove('drag-over'));
  if(dragSrcMember!==memberName||dragSrcIdx===idx) return; // 只支援同成員內排序
  const w=getWeek(); if(!w) return;
  const mt=w.tasks[memberName]||[];
  const [moved]=mt.splice(dragSrcIdx,1);
  mt.splice(idx,0,moved);
  refreshCard(memberName); debounceSave();
}

// ══════════════════════════════
//  Render
// ══════════════════════════════
function renderAll(){ renderNav(); renderTopbar(); if(view==='input'){ renderInputView(); setTimeout(loadDiscussion,0); } else renderOverview(); }

function renderNav(){
  document.getElementById('week-nav').innerHTML=state.weeks.map(w=>`
    <div class="nav-item${w.id===state.currentWeek?' active':''}" onclick="selectWeek('${w.id}')">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none" style="flex-shrink:0"><rect x="1" y="1" width="11" height="11" rx="2" stroke="currentColor" stroke-width="1.2"/><path d="M4 5h5M4 7.5h3" stroke="currentColor" stroke-width="1" stroke-linecap="round"/></svg>
      <span class="week-name" contenteditable="true" spellcheck="false"
        style="outline:none;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"
        onclick="event.stopPropagation()"
        onblur="saveNavWeekLabel(this,'${w.id}')"
        onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}"
      >${escHtml(w.label)}</span>
      <span class="week-pct">${getWeekPct(w)}%</span>
    </div>`).join('');
}

function renderTopbar(){
  const w=getWeek(); if(!w) return;
  let t=0,d=0;
  members.forEach(m=>{ const mt=w.tasks[m.name]||[]; t+=mt.length; d+=mt.filter(x=>x.done).length; });
  document.getElementById('topbar-title').textContent=w.label;
  document.getElementById('topbar-sub').textContent=`${d} / ${t} 項完成 · ${t?Math.round(d/t*100):0}%`;
}

function avatarHtml(m, size=45){
  if(m.avatar){
    return `<img src="${m.avatar}" class="avatar" style="width:${size}px;height:${size}px" alt="${escHtml(m.name)}"/>`;
  }
  return `<div class="avatar" style="width:${size}px;height:${size}px;background:${m.bg};color:${m.fg}">${m.name[0]}</div>`;
}

function renderInputView(){
  const w=getWeek(); if(!w) return;
  document.getElementById('member-grid').innerHTML=members.map(m=>{
    const mt=w.tasks[m.name]||[];
    const done=mt.filter(t=>t.done).length;
    const pct=mt.length?Math.round(done/mt.length*100):0;
    return `<div class="member-card">
      <div class="card-head">
        <div class="avatar-wrap" onclick="showEditMemberModal('${m.name}')" title="編輯成員">
          ${avatarHtml(m,45)}
          <div class="avatar-edit"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M8.5 1.5l2 2-7 7H1.5v-2l7-7z" stroke="white" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        </div>
        <div class="card-head-info" style="flex-direction:column;align-items:flex-start">
          <div class="card-member-name">${escHtml(m.name)}</div>
          <div class="card-progress-row">
            <div class="mini-bar"><div class="mini-bar-fill" id="bar-${m.name}" style="width:${pct}%"></div></div>
            <span class="mini-pct" id="pct-${m.name}">${done}/${mt.length}</span>
          </div>
        </div>
      </div>
      <div class="card-body">
        <div class="add-row">
          <input class="add-input" id="inp-${m.name}" placeholder="新增代辦事項（貼網址自動偵測）..." onkeydown="if(event.key==='Enter')addTask('${m.name}')"/>
          <button class="add-btn" onclick="addTask('${m.name}')">新增</button>
        </div>
        <div style="text-align:right;margin-top:-2px;margin-bottom:2px">
          <button class="icon-btn" style="font-size:11px;color:var(--text-3);gap:3px;padding:2px 6px" onclick="showAddLinkModal('${m.name}')" title="新增含超連結的任務">
            <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M4.5 6.5a2.5 2.5 0 0 0 3.5 0l1.5-1.5a2.5 2.5 0 0 0-3.5-3.5L5 3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><path d="M6.5 4.5a2.5 2.5 0 0 0-3.5 0L1.5 6A2.5 2.5 0 0 0 5 9.5L6 8.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
            附加超連結
          </button>
        </div>
        <div class="task-list" id="list-${m.name}">${renderTasks(m.name,w)}</div>
      </div>
    </div>`;
  }).join('');
}

function renderTasks(memberName,w){
  const mt=(w||getWeek()).tasks[memberName]||[];
  if(!mt.length) return `<div class="empty-state">輸入上方欄位新增任務</div>`;
  return mt.map((t,idx)=>`
    <div class="task-item${t.done?' done':''}"
      draggable="true"
      ondragstart="onDragStart(event,'${memberName}',${idx})"
      ondragend="onDragEnd(event)"
      ondragover="onDragOver(event,'${memberName}',${idx})"
      ondragleave="onDragLeave(event,'${memberName}')"
      ondrop="onDrop(event,'${memberName}',${idx})">
      <span class="drag-handle" title="拖移排序">
        <svg width="10" height="14" viewBox="0 0 10 14" fill="none"><circle cx="3" cy="2.5" r="1.2" fill="currentColor"/><circle cx="7" cy="2.5" r="1.2" fill="currentColor"/><circle cx="3" cy="7" r="1.2" fill="currentColor"/><circle cx="7" cy="7" r="1.2" fill="currentColor"/><circle cx="3" cy="11.5" r="1.2" fill="currentColor"/><circle cx="7" cy="11.5" r="1.2" fill="currentColor"/></svg>
      </span>
      <input type="checkbox" class="task-check" ${t.done?'checked':''} onchange="toggleTask('${memberName}',${t.id})"/>
      <span class="task-label" contenteditable="true" spellcheck="false"
        style="outline:none;border-radius:3px;padding:0 2px;transition:background .12s"
        onfocus="this.style.background='var(--surface)';this._orig=this.innerText"
        onblur="saveTaskText(this,'${memberName}',${t.id})"
        onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}"
        onclick="event.stopPropagation()"
      >${renderTaskLabel(t)}</span>
      <button class="task-del" onclick="deleteTask('${memberName}',${t.id})">✕</button>
    </div>`).join('');
}

function refreshCard(memberName){
  const w=getWeek(); if(!w) return;
  const mt=w.tasks[memberName]||[];
  const done=mt.filter(t=>t.done).length;
  const pct=mt.length?Math.round(done/mt.length*100):0;
  const el=document.getElementById('list-'+memberName); if(el) el.innerHTML=renderTasks(memberName,w);
  const bar=document.getElementById('bar-'+memberName); if(bar) bar.style.width=pct+'%';
  const pctEl=document.getElementById('pct-'+memberName); if(pctEl) pctEl.textContent=`${done}/${mt.length}`;
  renderTopbar(); renderNav();
}

function renderOverview(){
  const w=getWeek(); if(!w) return;
  let total=0,done=0;
  members.forEach(m=>{ const mt=w.tasks[m.name]||[]; total+=mt.length; done+=mt.filter(t=>t.done).length; });
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('stats-grid').innerHTML=`
    <div class="stat-box"><div class="stat-label">總任務</div><div class="stat-value">${total}</div><div class="stat-sub">本週全員合計</div></div>
    <div class="stat-box"><div class="stat-label">已完成</div><div class="stat-value" style="color:#2D5016">${done}</div><div class="stat-sub">勾選完成項目</div></div>
    <div class="stat-box"><div class="stat-label">待處理</div><div class="stat-value" style="color:#7A4F1F">${total-done}</div><div class="stat-sub">尚未完成項目</div></div>
    <div class="stat-box"><div class="stat-label">完成率</div><div class="stat-value">${pct}%</div><div class="overall-bar"><div class="overall-fill" style="width:${pct}%"></div></div></div>`;
  document.getElementById('overview-tbody').innerHTML=members.map(m=>{
    const mt=w.tasks[m.name]||[]; if(!mt.length) return '';
    const d=mt.filter(t=>t.done).length;
    const p=mt.length?Math.round(d/mt.length*100):0;
    return `<tr>
      <td><div class="member-cell">
        ${avatarHtml(m,28)}
        <div><div class="name">${escHtml(m.name)}</div><div class="count">${d}/${mt.length}</div></div>
      </div></td>
      <td><div class="task-chips">${mt.map(t=>`<span class="chip${t.done?' done':''}">${renderChipLabel(t)}</span>`).join('')}</div></td>
      <td><div class="row-bar-wrap">
        <div class="row-bar"><div class="row-bar-fill" style="width:${p}%"></div></div>
        <span class="row-pct">${p}%</span>
      </div></td>
    </tr>`;
  }).join('');
}

  document.getElementById('page-overview').classList.toggle('active',v==='overview');
  document.getElementById('btn-input').classList.toggle('active',v==='input');

}
function openSidebar(){ document.getElementById('sidebar').classList.add('open'); document.getElementById('mobile-overlay').classList.add('show'); }
function closeSidebar(){ document.getElementById('sidebar').classList.remove('open'); document.getElementById('mobile-overlay').classList.remove('show'); }
function closeModal(){ document.getElementById('modal-host').innerHTML=''; }
function toast(msg){ const el=document.createElement('div'); el.className='toast'; el.textContent=msg; document.getElementById('toast-host').appendChild(el); setTimeout(()=>el.remove(),2500); }
function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── 可編輯標題 ──
const LS_APPNAME = 'wm-app-name';

function initAppName(){
  const saved = localStorage.getItem(LS_APPNAME);
  const el = document.getElementById('app-name-text');
  if(saved && el) el.textContent = saved;
}

function saveAppName(el){
  el.style.borderBottomColor='transparent';
  const name = el.textContent.trim() || '週會任務管理';
  el.textContent = name;
  localStorage.setItem(LS_APPNAME, name);
  document.title = name;
}

function saveWeekLabel(el){
  el.style.borderBottomColor='transparent';
  const w = getWeek(); if(!w) return;
  const newLabel = el.textContent.trim();
  if(!newLabel){ el.textContent = w.label; return; }
  w.label = newLabel;
  renderNav();
  debounceSave();
}

function saveNavWeekLabel(el, weekId){
  const w = state.weeks.find(x=>x.id===weekId); if(!w) return;
  const newLabel = el.textContent.trim();
  if(!newLabel){ el.textContent = w.label; return; }
  w.label = newLabel;
  // 若是目前選中的週次，同步更新 topbar
  if(weekId === state.currentWeek){
    const tb = document.getElementById('topbar-title');
    if(tb) tb.textContent = newLabel;
  }
  debounceSave();
}


// ══════════════════════════════
//  週會討論事項
// ══════════════════════════════

function loadDiscussion(){
  const el=document.getElementById('discussion-body'); if(!el) return;
  const w=getWeek(); if(!w) return;
  el.innerHTML=w.discussion||'';
  wrapDiscussionImages(el);
}

function wrapDiscussionImages(el){
  el.querySelectorAll('img').forEach(img=>{
    if(img.parentNode && img.parentNode.classList && img.parentNode.classList.contains('disc-img-wrap')) return;
    img.style.cursor='zoom-in';
    img.style.maxWidth='100%';
    img.style.borderRadius='6px';
    img.style.margin='6px 0';
    img.style.display='block';
    // wrap
    const wrap=document.createElement('span');
    wrap.className='disc-img-wrap';
    wrap.contentEditable='false';
    wrap.style.cssText='position:relative;display:inline-block;max-width:100%;';
    img.parentNode.insertBefore(wrap,img);
    wrap.appendChild(img);
    // remove button
    const btn=document.createElement('button');
    btn.className='disc-img-remove';
    btn.title='移除圖片';
    btn.innerHTML='&times;';
    btn.onclick=(e)=>{
      e.stopPropagation();
      wrap.remove();
      saveDiscussion();
    };
    wrap.appendChild(btn);
    // zoom on click
    img.onclick=(e)=>{
      e.stopPropagation();
      openLightbox(img.src);
    };
  });
}

function saveDiscussion(){
  const el=document.getElementById('discussion-body'); if(!el) return;
  const w=getWeek(); if(!w) return;
  w.discussion=el.innerHTML;
  debounceSave();
}

function handleDiscussionPaste(e){
  const items=(e.clipboardData||window.clipboardData).items;
  if(items){
    for(let i=0;i<items.length;i++){
      if(items[i].type.startsWith('image/')){
        e.preventDefault();
        uploadAndInsertImage(items[i].getAsFile());
        return;
      }
    }
  }
  const text=(e.clipboardData||window.clipboardData).getData('text');
  if(text&&isUrl(text.trim())){
    e.preventDefault();
    const url=text.trim();
    const short=url.length>50?url.slice(0,50)+'…':url;
    document.execCommand('insertHTML',false,
      `<a href="${escHtml(url)}" target="_blank" rel="noopener">${escHtml(short)}</a>`);
    saveDiscussion();
  }
}

function handleDiscussionDrop(e){
  e.preventDefault();
  const files=e.dataTransfer.files;
  if(files&&files.length){
    for(let i=0;i<files.length;i++){
      if(files[i].type.startsWith('image/')){
        uploadAndInsertImage(files[i]);
        return;
      }
    }
  }
  const text=e.dataTransfer.getData('text');
  if(text&&isUrl(text.trim())){
    const url=text.trim();
    const short=url.length>50?url.slice(0,50)+'…':url;
    const el=document.getElementById('discussion-body'); if(!el) return;
    el.focus();
    document.execCommand('insertHTML',false,
      `<a href="${escHtml(url)}" target="_blank" rel="noopener">${escHtml(short)}</a>`);
    saveDiscussion();
  }
}

function triggerDiscussionImage(){
  const sel=window.getSelection();
  if(sel&&sel.rangeCount) window._discRange=sel.getRangeAt(0).cloneRange();
  const inp=document.getElementById('discussion-img-input');
  inp.value=''; inp.click();
}

function handleDiscussionImage(e){
  const file=e.target.files[0]; if(!file) return;
  uploadAndInsertImage(file);
}

// ── 圖床設定：請在下方填入你的 imgbb API Key ──
// 申請方式：https://imgbb.com → 登入 → About → API → 取得免費 API Key
// 填入後圖片就能跨裝置同步
const IMGBB_API_KEY = ''; // ← 在這裡填入你的 imgbb API Key

async function uploadImageToCloud(file){
  try {
    const b64 = await fileToBase64(file);
    if(!IMGBB_API_KEY) throw new Error('No API key');
    const form = new FormData();
    form.append('key', IMGBB_API_KEY);
    form.append('image', b64.split(',')[1]);
    const res = await fetch('https://api.imgbb.com/1/upload', { method:'POST', body:form });
    const json = await res.json();
    if(json.data && json.data.url) return json.data.url;
    throw new Error('imgbb failed');
  } catch(e) {
    return null; // 回傳 null，呼叫端會 fallback 用 base64（只有自己看得到）
  }
}

async function uploadAndInsertImage(file){
  const el=document.getElementById('discussion-body'); if(!el) return;
  el.focus();
  if(window._discRange){
    const sel=window.getSelection();
    sel.removeAllRanges(); sel.addRange(window._discRange);
    window._discRange=null;
  }
  const placeholderId='img-ph-'+Date.now();
  document.execCommand('insertHTML',false,
    `<span id="${placeholderId}" style="background:var(--surface2);color:var(--text-3);font-size:12px;padding:4px 10px;border-radius:4px;display:inline-block">⏳ 圖片上傳中...</span>`);

  try {
    const imgUrl = await uploadImageToCloud(file);
    if(!imgUrl) throw new Error('upload failed');
    const ph=document.getElementById(placeholderId);
    if(ph){
      const img=document.createElement('img');
      img.src=imgUrl;
      img.style.cssText='max-width:100%;border-radius:6px;margin:6px 0;display:block;cursor:zoom-in';
      img.onclick=()=>openLightbox(imgUrl);
      ph.replaceWith(img);
      img.after(document.createElement('br'));
    }
    wrapDiscussionImages(el);
    saveDiscussion();
    toast('✅ 圖片上傳成功，所有人都看得到');
  } catch(err){
    console.error('Imgur upload failed:',err);
    // fallback: base64 embed（只有自己看得到）
    try {
      const b64=await fileToBase64(file);
      const ph=document.getElementById(placeholderId);
      if(ph){
        const img=document.createElement('img');
        img.src=b64;
        img.style.cssText='max-width:100%;border-radius:6px;margin:6px 0;display:block;cursor:zoom-in';
        img.onclick=()=>openLightbox(b64);
        ph.replaceWith(img);
        img.after(document.createElement('br'));
      }
      wrapDiscussionImages(el);
      saveDiscussion();
      toast('⚠️ 圖床上傳失敗，圖片已嵌入本機（他人無法看到）');
    } catch(e2){ console.error(e2); }
  }
}

function fileToBase64(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=ev=>res(ev.target.result);
    r.onerror=rej;
    r.readAsDataURL(file);
  });
}

function handleDiscussionClick(e){
  // 在 contenteditable 中讓超連結可以正常點擊開啟
  const a = e.target.closest('a');
  if(a && a.href){
    e.preventDefault();
    window.open(a.href, '_blank', 'noopener');
  }
}

function openLightbox(src){
  const box=document.createElement('div');
  box.className='lightbox';
  box.innerHTML=`<span class="lightbox-close" title="關閉">&times;</span><img src="${escHtml(src)}" alt="圖片"/>`;
  box.querySelector('.lightbox-close').onclick=()=>box.remove();
  box.onclick=(e)=>{ if(e.target===box) box.remove(); };
  document.body.appendChild(box);
}

function showDiscussionLinkModal(){
  const sel=window.getSelection();
  if(sel&&sel.rangeCount) window._discRange=sel.getRangeAt(0).cloneRange();
  document.getElementById('modal-host').innerHTML=`
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h3>插入超連結</h3>
        <label>顯示文字</label>
        <input id="disc-link-text" placeholder="例：設計稿連結" style="margin-bottom:10px"/>
        <label>網址</label>
        <input id="disc-link-url" type="url" placeholder="https://..." onkeydown="if(event.key==='Enter')confirmDiscLink()"/>
        <div class="modal-btns">
          <button class="btn" onclick="closeModal()">取消</button>
          <button class="btn btn-primary" onclick="confirmDiscLink()">插入</button>
        </div>
      </div>
    </div>`;
  setTimeout(()=>document.getElementById('disc-link-text').focus(),50);
}

function confirmDiscLink(){
  const text=(document.getElementById('disc-link-text').value||'').trim();
  const url=(document.getElementById('disc-link-url').value||'').trim();
  if(!url||!isUrl(url)){ toast('請輸入正確的網址'); return; }
  const label=text||url;
  const el=document.getElementById('discussion-body');
  if(el){
    el.focus();
    if(window._discRange){
      const sel=window.getSelection();
      sel.removeAllRanges(); sel.addRange(window._discRange);
      window._discRange=null;
    }
    document.execCommand('insertHTML',false,
      `<a href="${escHtml(url)}" target="_blank" rel="noopener">${escHtml(label)}</a>`);
    saveDiscussion();
  }
  closeModal();
}

// ── 大頭貼同步 ──
function encodeMembersToState(){
  state.membersMeta=members.map(m=>({name:m.name,bg:m.bg,fg:m.fg,avatar:m.avatar||null}));
}

function decodeMembersFromState(){
  if(!state.membersMeta||!state.membersMeta.length) return;
  state.membersMeta.forEach(sm=>{
    const local=members.find(m=>m.name===sm.name);
    if(local){
      if(sm.avatar) local.avatar=sm.avatar;
      local.bg=sm.bg||local.bg;
      local.fg=sm.fg||local.fg;
    } else {
      // 新成員：加入 members list
      members.push({name:sm.name,bg:sm.bg,fg:sm.fg,avatar:sm.avatar||null});
    }
  });
  saveMembersMeta();
}
